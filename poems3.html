<main class="poem fade">

<p>
The sun brings joyous light to see,<br>
though the night, still strong,<br>
remains unsheathed.<br><br>

Suppressed it may at some point seem,<br>
but forgotten, it will never be.<br><br>

And to thee will my love never cease<br>
Even as the days and years do flee…<br><br>

<strong><u>Perpetually.</u></strong>
</p>
